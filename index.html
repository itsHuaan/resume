<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV - Đỗ Quang Huân</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="controls-wrapper">
  <button class="controls-toggle" id="controls-toggle">
    <i class="fas fa-cog"></i>
  </button>
  
  <div class="controls-menu" id="controls-menu">
    <div class="control-group">
      <div class="control-label">Language</div>
      <div class="lang-switch">
        <button id="btn-vi" class="active">VI</button>
        <button id="btn-en">EN</button>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label">Layout</div>
      <div class="layout-switch">
        <button data-layout="default" class="active"><i class="fas fa-columns"></i> Sidebar</button>
        <button data-layout="modern"><i class="fas fa-window-maximize"></i> Modern</button>
        <button data-layout="compact"><i class="fas fa-list"></i> Compact</button>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label">Theme</div>
      <div class="theme-switch">
        <button id="theme-light"><i class="fas fa-sun"></i> Light</button>
        <button id="theme-dark"><i class="fas fa-moon"></i> Dark</button>
        <button id="theme-device" class="active"><i class="fas fa-desktop"></i> Device</button>
      </div>
    </div>
  </div>
</div>

<div class="cv-wrapper">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>
<script src="main.js"></script>
</body>
</html>
